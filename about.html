<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DINO GREJO</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #EFB078;
      --accent-dark: #c8895a;
      --bg: #0d0c0b;
      --surface: #141210;
      --text: #f0ece6;
      --muted: #7a7268;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(239,176,120,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* Card */
    .card {
      position: relative;
      width: 380px;
      padding: 3rem 2.5rem;
      border: 1px solid rgba(239,176,120,0.12);
      border-radius: 24px;
      background: rgba(20,18,16,0.9);
      backdrop-filter: blur(20px);
      text-align: center;
      opacity: 0;
      transform: translateY(30px) scale(0.97);
      animation: reveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(239,176,120,0.3), transparent 50%, rgba(239,176,120,0.08));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes reveal {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 1.75rem;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, transparent 120deg, var(--accent-dark) 240deg, transparent 360deg);
      animation: spin 8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg);
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .avatar:hover { transform: scale(1.06); }

    /* Name */
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.2rem;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f5e6d3 0%, var(--accent) 60%, #c8895a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(239,176,120,0.25), transparent);
      margin-bottom: 2rem;
    }

    /* Social */
    .social-icons {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }

    .social-icons li {
      opacity: 0;
      transform: translateY(12px);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .social-icons li:nth-child(1) { animation-delay: 0.7s; }
    .social-icons li:nth-child(2) { animation-delay: 0.82s; }
    .social-icons li:nth-child(3) { animation-delay: 0.94s; }
    .social-icons li:nth-child(4) { animation-delay: 1.06s; }
    .social-icons li:nth-child(5) { animation-delay: 1.18s; }

    @keyframes popIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(239,176,120,0.06);
      border: 1px solid rgba(239,176,120,0.1);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }

    .social-icons a::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(239,176,120,0.15), transparent 70%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .social-icons a:hover {
      color: var(--accent);
      border-color: rgba(239,176,120,0.4);
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 24px rgba(239,176,120,0.15);
    }

    .social-icons a:hover::before { opacity: 1; }

    .social-icons svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      position: relative;
      z-index: 1;
    }

    /* Tag */
    .tag {
      display: inline-block;
      margin: 0 3px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(239,176,120,0.1);
      border: 1px solid rgba(239,176,120,0.2);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 400;
    }

    .tags {
      margin-bottom: 2rem;
      opacity: 0;
      animation: reveal 0.8s ease 0.9s forwards;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img src="https://avatars3.githubusercontent.com/u/8224597?s=400&v=4" alt="Dino Grejo" class="avatar" />
    </div>

    <h1>DINO GREJO</h1>
    <p class="subtitle">Logística &amp; Música</p>

    <div class="tags">
      <span class="tag">Logistics</span>
      <span class="tag">Music</span>
    </div>

    <div class="divider"></div>

    <ul class="social-icons">
      <!-- X -->
      <li>
        <a href="https://x.com/dinogrejo" target="_blank" aria-label="X">
          <svg viewBox="0 0 24 24"><path d="M20.643 3.437h-3.48l-4.7 6.39-4.536-6.39H3.357l6.75 9.547-6.75 9.578h3.48l4.89-6.626 4.751 6.626h3.505l-6.937-9.69 6.937-9.458z"/></svg>
        </a>
      </li>
      <!-- GitHub -->
      <li>
        <a href="https://github.com/dgrej" target="_blank" aria-label="GitHub">
          <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.373 0 12a12.01 12.01 0 0 0 8.208 11.387c.6.113.82-.26.82-.577v-2.234c-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.086 1.84 1.24 1.84 1.24 1.07 1.834 2.809 1.304 3.494.997.108-.776.418-1.305.762-1.605-2.665-.308-5.466-1.335-5.466-5.933 0-1.31.468-2.382 1.236-3.22-.124-.303-.536-1.523.117-3.176 0 0 1.008-.322 3.3 1.23a11.47 11.47 0 0 1 3-.404c1.02.005 2.047.138 3.002.404 2.29-1.553 3.297-1.23 3.297-1.23.655 1.653.243 2.873.12 3.176.77.838 1.235 1.91 1.235 3.22 0 4.61-2.805 5.62-5.475 5.922.43.37.823 1.102.823 2.222v3.293c0 .32.218.694.825.576A12.012 12.012 0 0 0 24 12c0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </li>
      <!-- TikTok -->
      <li>
        <a href="https://tiktok.com/@dinogrejo" target="_blank" aria-label="TikTok">
          <svg viewBox="0 0 48 48"><path d="M33.9 14.1c-2.2-1.1-3.8-3.2-4.1-5.7H26v23.7c0 2.2-1.8 4-4 4s-4-1.8-4-4c0-1.6 1-3 2.4-3.6v-5.1c-4.3.7-7.6 4.5-7.6 9 0 5 4 9 9 9s9-4 9-9V18.3c1.6 1.3 3.5 2.2 5.6 2.5v-6.1c-1.2-.2-2.3-.6-3.5-1.1z"/></svg>
        </a>
      </li>
      <!-- YouTube -->
      <li>
        <a href="https://youtube.com/dinogrejo" target="_blank" aria-label="YouTube">
          <svg viewBox="0 0 24 24"><path d="M23.5 6.2s-.2-1.6-.9-2.3c-.9-.9-1.9-.9-2.3-1C17.3 2.5 12 2.5 12 2.5h0s-5.3 0-8.3.4c-.4 0-1.5.1-2.3 1C.7 4.6.5 6.2.5 6.2S0 8.1 0 10v4c0 1.9.5 3.8.5 3.8s.2 1.6.9 2.3c.9.9 2.1.9 2.6 1 1.9.1 8 .4 8 .4s5.3 0 8.3-.4c.4 0 1.5-.1 2.3-1 .7-.7.9-2.3.9-2.3S24 15.9 24 14v-4c0-1.9-.5-3.8-.5-3.8zM9.6 15.5v-7l6.4 3.5-6.4 3.5z"/></svg>
        </a>
      </li>
      <!-- Email -->
      <li>
        <a href="mailto:dinogrejo@gmail.com" aria-label="Email">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 2v.01L12 13 4 6.01V6h16zM4 18V8.2l7.6 6.8c.3.3.8.3 1.1 0L20 8.2V18H4z"/></svg>
        </a>
      </li>
    </ul>
  </div>

  <script>
    // Mouse parallax effect on card
    const card = document.querySelector('.card');
    const glow = document.querySelector('.glow');

    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;
      card.style.transform = `perspective(800px) rotateY(${x * 6}deg) rotateX(${-y * 6}deg)`;
      glow.style.transform = `translate(calc(-50% + ${x * 30}px), calc(-50% + ${y * 30}px))`;
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
    });
  </script>
</body>
</html>
